name: Deploy Choubey Roadlines to GitHub Pages

on:
  push:
    branches: [ main ]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Pages
        uses: actions/configure-pages@v4
      
      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: './web'   # tumhara website yahin hai
      
      - name: Deploy to Pages
        uses: actions/deploy-pages@v4
