apiVersion: apps/v1
kind: Deployment
metadata:
  name: choubey-web
  namespace: production
  labels:
    app: choubey
spec:
  replicas: 3
  selector:
    matchLabels:
      app: choubey
  template:
    metadata:
      labels:
        app: choubey
    spec:
      containers:
      - name: web
        image: <ACCOUNT_ID>.dkr.ecr.ap-south-1.amazonaws.com/choubey:latest
        ports:
        - containerPort: 80
        resources:
          requests: { cpu: "100m", memory: "128Mi" }
          limits: { cpu: "250m", memory: "256Mi" }
        livenessProbe:
          httpGet: { path: /, port: 80 }
          initialDelaySeconds: 10
        readinessProbe:
          httpGet: { path: /, port: 80 }
          initialDelaySeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: choubey-service
  namespace: production
spec:
  type: LoadBalancer
  selector:
    app: choubey
  ports:
  - port: 80
    targetPort: 80
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: choubey-hpa
  namespace: production
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: choubey-web
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
